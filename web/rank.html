<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LeRobot 用户排行榜</title>
    <link rel="stylesheet" href="/styles.css?v=20260630-apple-style" />
    <link rel="stylesheet" href="/admin.css?v=20260630-apple-style" />
  </head>
  <body class="admin-page">
    <header class="admin-topbar">
      <div>
        <p class="admin-eyebrow">LeRobot QC</p>
        <h1>用户排行榜</h1>
        <p id="datasetPath" class="admin-subtitle"></p>
      </div>
      <nav class="admin-actions">
        <a href="/" class="admin-link" data-context-link="/">普通质检</a>
        <button id="refreshButton" type="button">刷新</button>
      </nav>
    </header>

    <main class="admin-main">
      <section class="admin-metrics" aria-label="全局统计">
        <div>
          <span>总数</span>
          <strong id="totalCount">0</strong>
        </div>
        <div>
          <span>已标</span>
          <strong id="markedCount">0</strong>
        </div>
        <div>
          <span>接收</span>
          <strong id="acceptCount">0</strong>
        </div>
        <div>
          <span>拒绝</span>
          <strong id="rejectCount">0</strong>
        </div>
        <div>
          <span>待审</span>
          <strong id="pendingCount">0</strong>
        </div>
      </section>

      <section class="rank-grid">
        <section class="admin-section">
          <header>
            <h2>标注数排行榜</h2>
            <span id="markedUpdatedAt"></span>
          </header>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>用户</th>
                  <th>标注数</th>
                  <th>接收</th>
                  <th>拒绝</th>
                  <th>拒绝率</th>
                  <th>最近活动</th>
                </tr>
              </thead>
              <tbody id="markedRankBody"></tbody>
            </table>
          </div>
        </section>

        <section class="admin-section">
          <header>
            <h2>拒绝率排行榜</h2>
            <span id="rejectRateUpdatedAt"></span>
          </header>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>用户</th>
                  <th>拒绝率</th>
                  <th>拒绝</th>
                  <th>标注数</th>
                  <th>接收</th>
                  <th>最近活动</th>
                </tr>
              </thead>
              <tbody id="rejectRateRankBody"></tbody>
            </table>
          </div>
        </section>

        <section class="admin-section">
          <header>
            <h2>采集人拒绝率排行榜</h2>
            <span id="collectorUpdatedAt"></span>
          </header>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>采集人</th>
                  <th>拒绝率</th>
                  <th>拒绝</th>
                  <th>标注数</th>
                  <th>接收</th>
                  <th>待审</th>
                </tr>
              </thead>
              <tbody id="collectorRejectRateRankBody"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="/rank.js?v=20260630-collector-rank"></script>
  </body>
</html>
