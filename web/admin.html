<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LeRobot 标注管理</title>
    <link rel="stylesheet" href="/styles.css" />
    <link rel="stylesheet" href="/admin.css" />
  </head>
  <body class="admin-page">
    <header class="admin-topbar">
      <div>
        <p class="admin-eyebrow">LeRobot QC</p>
        <h1>标注管理</h1>
        <p id="datasetPath" class="admin-subtitle"></p>
      </div>
      <nav class="admin-actions">
        <a href="/" class="admin-link">质检页面</a>
        <button id="refreshButton" type="button">刷新</button>
      </nav>
    </header>

    <main class="admin-main">
      <section class="admin-metrics" aria-label="全局统计">
        <div>
          <span>总数</span>
          <strong id="totalCount">0</strong>
        </div>
        <div>
          <span>已标</span>
          <strong id="markedCount">0</strong>
        </div>
        <div>
          <span>接收</span>
          <strong id="acceptCount">0</strong>
        </div>
        <div>
          <span>拒绝</span>
          <strong id="rejectCount">0</strong>
        </div>
        <div>
          <span>待审</span>
          <strong id="pendingCount">0</strong>
        </div>
      </section>

      <section class="admin-section admin-review-section">
        <header>
          <div>
            <h2>管理员标注</h2>
            <span>无视占用锁，点击列表后直接改最终状态</span>
          </div>
          <div class="admin-review-controls">
            <select id="reviewStatusFilter" aria-label="按状态筛选">
              <option value="all">全部状态</option>
              <option value="pending">待审</option>
              <option value="accept">接收</option>
              <option value="reject">拒绝</option>
            </select>
            <button id="reviewPrevButton" type="button">上一页</button>
            <span id="reviewPageInfo">1 / 1</span>
            <button id="reviewNextButton" type="button">下一页</button>
          </div>
        </header>
        <div class="admin-review-grid">
          <div id="reviewEpisodeList" class="admin-episode-list" aria-label="Episode 列表"></div>
          <aside class="admin-label-panel">
            <span id="reviewSelectedStatus" class="status-pill pending">待审</span>
            <h3 id="reviewSelectedTitle">选择一个 episode</h3>
            <p id="reviewSelectedMeta"></p>
            <div class="admin-status-actions">
              <button id="reviewRejectButton" class="reject-action" type="button">拒绝</button>
              <button id="reviewPendingButton" class="pending-action" type="button">待审</button>
              <button id="reviewAcceptButton" class="accept-action" type="button">接收</button>
            </div>
            <p id="reviewMessage" class="admin-review-message"></p>
          </aside>
        </div>
      </section>

      <section class="admin-section">
        <header>
          <h2>用户标注情况</h2>
          <span id="updatedAt"></span>
        </header>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>用户</th>
                <th>已标</th>
                <th>接收</th>
                <th>拒绝</th>
                <th>待审</th>
                <th>事件数</th>
                <th>最近活动</th>
              </tr>
            </thead>
            <tbody id="usersBody"></tbody>
          </table>
        </div>
      </section>

      <section class="admin-grid">
        <section class="admin-section">
          <header>
            <h2>当前占用</h2>
            <span id="activeCount">0</span>
          </header>
          <div class="table-wrap compact">
            <table>
              <thead>
                <tr>
                  <th>Episode</th>
                  <th>用户</th>
                </tr>
              </thead>
              <tbody id="activeBody"></tbody>
            </table>
          </div>
        </section>

        <section class="admin-section">
          <header>
            <h2>最近标注</h2>
            <span id="recentCount">0</span>
          </header>
          <div class="table-wrap compact">
            <table>
              <thead>
                <tr>
                  <th>Episode</th>
                  <th>状态</th>
                  <th>用户</th>
                  <th>时间</th>
                </tr>
              </thead>
              <tbody id="recentBody"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="/admin.js"></script>
  </body>
</html>
